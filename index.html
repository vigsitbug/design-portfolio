<!DOCTYPE html>
<html>
<head>
  <title>My Design Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Design Portfolio</h1>
<p>Of Abhinav</p>

<div class="gallery">
  <img src="1.png">
  <img src="2.png">
  <img src="3.png">
  <img src="4.png">
  <img src="5.png">
  <img src="6.png">
  <img src="7.png">
  <img src="football.png">
  <img src="grandf.png">
  <img src="kabaddi.png">
  <img src="tugofwar.png">
</div>

</body>
</html>
