<!DOCTYPE html>
<html>
<head>
  <title>Abhinav | Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 60px;
      letter-spacing: 2px;
    }

    .back {
      display: block;
      text-align: center;
      margin: 20px 0;
      color: white;
      text-decoration: none;
      opacity: 0.7;
    }

    .gallery {
      column-count: 3;
      column-gap: 18px;
      padding: 30px;
    }

    @media (max-width: 900px) {
      .gallery { column-count: 2; }
    }

    @media (max-width: 500px) {
      .gallery { column-count: 1; }
    }

    .card {
      break-inside: avoid;
      margin-bottom: 18px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img,
    .card video {
      width: 100%;
      display: block;
    }

    /* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  align-items: center;
  justify-content: center;
}

.modal.show {
  display: flex;
}

.modal-content {
  max-width: 90%;
  max-height: 85%;
  border-radius: 16px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.9);
  animation: zoomIn 0.3s ease;
}

.modal img,
.modal video {
  width: 100%;
  height: auto;
  border-radius: 16px;
}

@keyframes zoomIn {
  from {
    transform: scale(0.85);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      font-size: 35px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>Old Work</h1>
<a href="index.html" class="back">← Back</a>

<div class="gallery">

  <!-- VIDEO (hover play) -->
  <div class="card">
    <video src="pwrlk.mp4" muted loop playsinline></video>
  </div>

  <div class="card">
    <video src="cuzn.mp4" muted loop playsinline></video>
  </div>

  <!-- IMAGES -->
  <div class="card"><img src="cover.png"></div>
  <div class="card"><img src="cover ext.png"></div>
  <div class="card"><img src="cad.png"></div>
  <div class="card"><img src="rb.png"></div>
  <div class="card"><img src="reg f.png"></div>
<div class="card"><img src="sus.png"></div>
  <div class="card"><img src="th.png"></div>
  <div class="card"><img src="fv.png"></div>
  
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close">&times;</span>

  <div class="modal-content">
    <img id="modal-img">
    <video id="modal-video" controls></video>
  </div>
</div>

<script>

// HOVER PLAY FOR VIDEOS
document.querySelectorAll("video").forEach(video => {
  video.addEventListener("mouseenter", () => video.play());
  video.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
  });
});


// MODAL
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const modalVideo = document.getElementById("modal-video");

// IMAGE CLICK
document.querySelectorAll(".card img").forEach(img => {
  img.onclick = () => {
    modal.style.display = "flex";
    modalImg.style.display = "block";
    modalVideo.style.display = "none";
    modalImg.src = img.src;
  }
});

// VIDEO CLICK
document.querySelectorAll(".card video").forEach(video => {
  video.onclick = () => {
   modal.classList.add("show");
    modalVideo.style.display = "block";
    modal.classList.remove("show");
    modalVideo.src = video.src;
    modalVideo.play();
  }
});

// CLOSE
document.querySelector(".close").onclick = () => {
  modal.style.display = "none";
  modalVideo.pause();
};

modal.onclick = () => {
  modal.style.display = "none";
  modalVideo.pause();
};

</script>

</body>
</html>
